name: Tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Phase1-VulnarabilitiReport
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            Phase1-VulnarabilitiReport/pyproject.toml

      - name: Install BreakBot with dev + llm + viz extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,llm,viz]"

      - name: Run pytest
        # Phase 5 LLM test self-skips without ANTHROPIC_API_KEY via pytest.mark.skipif.
        # All moto-based scanner tests are pure unit tests (no AWS / no key).
        run: pytest tests/ -v
